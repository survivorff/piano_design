<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="Arial, sans-serif">
  <rect width="480" height="300" fill="#ffffff"/>
  <text x="240" y="26" font-size="16" font-weight="bold" text-anchor="middle" fill="#222">手型对比：自然拱形 vs 错误</text>

  <!-- correct hand (left) -->
  <text x="130" y="56" font-size="13" font-weight="bold" text-anchor="middle" fill="#27ae60">✓ 正确：拱形、指尖触键</text>
  <!-- key surface -->
  <line x1="40" y1="220" x2="220" y2="220" stroke="#333" stroke-width="2"/>
  <!-- arch: wrist level, knuckles up, fingers curved to fingertips -->
  <path d="M50 200 Q60 150 110 150 Q170 150 200 200" fill="none" stroke="#2980b9" stroke-width="5" stroke-linecap="round"/>
  <!-- finger tips down to keys -->
  <line x1="200" y1="200" x2="205" y2="218" stroke="#2980b9" stroke-width="5" stroke-linecap="round"/>
  <line x1="160" y1="158" x2="168" y2="218" stroke="#2980b9" stroke-width="5" stroke-linecap="round"/>
  <line x1="120" y1="150" x2="128" y2="218" stroke="#2980b9" stroke-width="5" stroke-linecap="round"/>
  <line x1="85" y1="158" x2="92" y2="218" stroke="#2980b9" stroke-width="5" stroke-linecap="round"/>
  <!-- thumb -->
  <line x1="50" y1="200" x2="60" y2="218" stroke="#2980b9" stroke-width="5" stroke-linecap="round"/>
  <text x="130" y="245" font-size="11" text-anchor="middle" fill="#555">掌关节撑起穹顶，掌心是"空"的</text>
  <text x="130" y="262" font-size="11" text-anchor="middle" fill="#555">像轻握一个小球</text>

  <!-- wrong hand (right): flat fingers / collapsed -->
  <text x="360" y="56" font-size="13" font-weight="bold" text-anchor="middle" fill="#c0392b">✗ 错误：手指伸平 / 瘪掌</text>
  <line x1="270" y1="220" x2="450" y2="220" stroke="#333" stroke-width="2"/>
  <!-- collapsed flat -->
  <path d="M280 205 L360 205 L440 212" fill="none" stroke="#c0392b" stroke-width="5" stroke-linecap="round"/>
  <line x1="300" y1="205" x2="305" y2="218" stroke="#c0392b" stroke-width="4"/>
  <line x1="340" y1="205" x2="345" y2="218" stroke="#c0392b" stroke-width="4"/>
  <line x1="380" y1="207" x2="385" y2="218" stroke="#c0392b" stroke-width="4"/>
  <line x1="420" y1="210" x2="425" y2="218" stroke="#c0392b" stroke-width="4"/>
  <text x="360" y="245" font-size="11" text-anchor="middle" fill="#555">手指平放、掌关节塌陷</text>
  <text x="360" y="262" font-size="11" text-anchor="middle" fill="#555">失去弹性和支撑，难以控制</text>

  <text x="240" y="288" font-size="11" text-anchor="middle" fill="#888">指甲剪短；用指尖（拇指用侧面）触键；手腕与手背大致平</text>
</svg>
