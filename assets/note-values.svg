<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" font-family="Arial, sans-serif">
  <rect width="560" height="320" fill="#ffffff"/>
  <text x="280" y="24" font-size="16" font-weight="bold" text-anchor="middle" fill="#222">音符时值（4/4 拍中）：每往下一级，时值减半</text>

  <!-- tree-like proportional bars -->
  <!-- whole = 4 beats -> full width bar -->
  <g font-size="12">
    <!-- whole note -->
    <ellipse cx="60" cy="60" rx="13" ry="9" fill="none" stroke="#222" stroke-width="2.5"/>
    <text x="95" y="58" font-size="13" font-weight="bold" fill="#222">全音符</text>
    <text x="95" y="74" font-size="11" fill="#555">4 拍</text>
    <rect x="180" y="50" width="360" height="20" fill="#2980b9" opacity="0.85" stroke="#1b5e8a"/>
    <text x="360" y="65" font-size="11" fill="#fff" text-anchor="middle">4 拍</text>

    <!-- half note -->
    <ellipse cx="60" cy="110" rx="11" ry="8" fill="none" stroke="#222" stroke-width="2.5"/>
    <line x1="71" y1="110" x2="71" y2="84" stroke="#222" stroke-width="2"/>
    <text x="95" y="108" font-size="13" font-weight="bold" fill="#222">二分音符</text>
    <text x="95" y="124" font-size="11" fill="#555">2 拍</text>
    <rect x="180" y="100" width="178" height="20" fill="#27ae60" opacity="0.85" stroke="#1b7a43"/>
    <rect x="362" y="100" width="178" height="20" fill="#27ae60" opacity="0.55" stroke="#1b7a43"/>

    <!-- quarter note -->
    <ellipse cx="60" cy="160" rx="10" ry="7.5" fill="#222"/>
    <line x1="70" y1="160" x2="70" y2="136" stroke="#222" stroke-width="2"/>
    <text x="95" y="158" font-size="13" font-weight="bold" fill="#222">四分音符</text>
    <text x="95" y="174" font-size="11" fill="#555">1 拍</text>
    <g fill="#e67e22" opacity="0.85" stroke="#a85b14">
      <rect x="180" y="150" width="85" height="20"/>
      <rect x="270" y="150" width="85" height="20"/>
      <rect x="360" y="150" width="85" height="20"/>
      <rect x="450" y="150" width="85" height="20"/>
    </g>

    <!-- eighth note -->
    <ellipse cx="60" cy="210" rx="9" ry="7" fill="#222"/>
    <line x1="69" y1="210" x2="69" y2="188" stroke="#222" stroke-width="2"/>
    <path d="M69 188 q14 4 12 18" fill="none" stroke="#222" stroke-width="2"/>
    <text x="95" y="208" font-size="13" font-weight="bold" fill="#222">八分音符</text>
    <text x="95" y="224" font-size="11" fill="#555">½ 拍</text>
    <g fill="#9b59b6" opacity="0.85" stroke="#6f3d85">
      <rect x="180" y="200" width="41" height="20"/>
      <rect x="225" y="200" width="41" height="20"/>
      <rect x="270" y="200" width="41" height="20"/>
      <rect x="315" y="200" width="41" height="20"/>
      <rect x="360" y="200" width="41" height="20"/>
      <rect x="405" y="200" width="41" height="20"/>
      <rect x="450" y="200" width="41" height="20"/>
      <rect x="495" y="200" width="41" height="20"/>
    </g>

    <!-- sixteenth note -->
    <ellipse cx="60" cy="260" rx="8" ry="6.5" fill="#222"/>
    <line x1="68" y1="260" x2="68" y2="238" stroke="#222" stroke-width="2"/>
    <path d="M68 238 q14 4 12 16" fill="none" stroke="#222" stroke-width="2"/>
    <path d="M68 248 q14 4 12 16" fill="none" stroke="#222" stroke-width="2"/>
    <text x="95" y="258" font-size="13" font-weight="bold" fill="#222">十六分音符</text>
    <text x="95" y="274" font-size="11" fill="#555">¼ 拍</text>
    <g fill="#c0392b" opacity="0.85">
      <rect x="180" y="250" width="19" height="20"/>
      <rect x="202" y="250" width="19" height="20"/>
      <rect x="224" y="250" width="19" height="20"/>
      <rect x="246" y="250" width="19" height="20"/>
      <rect x="268" y="250" width="19" height="20"/>
      <rect x="290" y="250" width="19" height="20"/>
      <rect x="312" y="250" width="19" height="20"/>
      <rect x="334" y="250" width="19" height="20"/>
      <rect x="356" y="250" width="19" height="20"/>
      <rect x="378" y="250" width="19" height="20"/>
      <rect x="400" y="250" width="19" height="20"/>
      <rect x="422" y="250" width="19" height="20"/>
      <rect x="444" y="250" width="19" height="20"/>
      <rect x="466" y="250" width="19" height="20"/>
      <rect x="488" y="250" width="19" height="20"/>
      <rect x="510" y="250" width="19" height="20"/>
    </g>
  </g>

  <text x="280" y="300" font-size="11" text-anchor="middle" fill="#888">同样的总长度（4拍）可被不同音符等分；附点 = 时值再加一半</text>
</svg>
