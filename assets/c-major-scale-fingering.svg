<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 300" font-family="Arial, sans-serif">
  <rect width="620" height="300" fill="#ffffff"/>
  <text x="310" y="24" font-size="16" font-weight="bold" text-anchor="middle" fill="#222">C 大调音阶指法（一个八度）</text>

  <!-- draw 8 white keys C-D-E-F-G-A-B-C, width 60 each, x start 40 -->
  <g stroke="#333" stroke-width="1.5" fill="#fff">
    <rect x="40"  y="70" width="60" height="150"/>
    <rect x="100" y="70" width="60" height="150"/>
    <rect x="160" y="70" width="60" height="150"/>
    <rect x="220" y="70" width="60" height="150"/>
    <rect x="280" y="70" width="60" height="150"/>
    <rect x="340" y="70" width="60" height="150"/>
    <rect x="400" y="70" width="60" height="150"/>
    <rect x="460" y="70" width="60" height="150"/>
  </g>
  <!-- black keys: C#(between 1&2)->x90, D#->x150, F#->x270, G#->x330, A#->x390 ; width40 h95 -->
  <g fill="#222">
    <rect x="80"  y="70" width="40" height="95"/>
    <rect x="140" y="70" width="40" height="95"/>
    <rect x="250" y="70" width="40" height="95"/>
    <rect x="310" y="70" width="40" height="95"/>
    <rect x="370" y="70" width="40" height="95"/>
  </g>

  <!-- note names -->
  <g font-size="14" font-weight="bold" fill="#888" text-anchor="middle">
    <text x="70"  y="210">C</text>
    <text x="130" y="210">D</text>
    <text x="190" y="210">E</text>
    <text x="250" y="210">F</text>
    <text x="310" y="210">G</text>
    <text x="370" y="210">A</text>
    <text x="430" y="210">B</text>
    <text x="490" y="210">C</text>
  </g>

  <!-- Right hand fingering (above keys) -->
  <text x="20" y="56" font-size="12" fill="#c0392b" font-weight="bold">右手 RH ↑</text>
  <g font-size="16" font-weight="bold" fill="#c0392b" text-anchor="middle">
    <text x="70"  y="56">1</text>
    <text x="130" y="56">2</text>
    <text x="190" y="56">3</text>
    <text x="250" y="56">1</text>
    <text x="310" y="56">2</text>
    <text x="370" y="56">3</text>
    <text x="430" y="56">4</text>
    <text x="490" y="56">5</text>
  </g>
  <!-- thumb-under marker at F -->
  <text x="250" y="240" font-size="10" fill="#c0392b" text-anchor="middle">↑拇指穿过</text>

  <!-- Left hand fingering (below) -->
  <text x="20" y="262" font-size="12" fill="#2980b9" font-weight="bold">左手 LH ↑</text>
  <g font-size="16" font-weight="bold" fill="#2980b9" text-anchor="middle">
    <text x="70"  y="262">5</text>
    <text x="130" y="262">4</text>
    <text x="190" y="262">3</text>
    <text x="250" y="262">2</text>
    <text x="310" y="262">1</text>
    <text x="370" y="262">3</text>
    <text x="430" y="262">2</text>
    <text x="490" y="262">1</text>
  </g>
  <text x="310" y="284" font-size="11" text-anchor="middle" fill="#888">下行指法为上行的反向。RH 在 F 处拇指穿过；LH 在 G 处第3指跨过</text>
</svg>
