<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 260" font-family="Arial, sans-serif">
  <rect width="560" height="260" fill="#ffffff"/>
  <text x="280" y="24" font-size="16" font-weight="bold" text-anchor="middle" fill="#222">钢琴键盘一个八度（C 到 B）</text>

  <!-- White keys: 7 keys, each 70 wide, starting x=20, y=40, height 190 -->
  <g stroke="#333" stroke-width="1.5">
    <rect x="20"  y="40" width="70" height="190" fill="#fff"/>
    <rect x="90"  y="40" width="70" height="190" fill="#fff"/>
    <rect x="160" y="40" width="70" height="190" fill="#fff"/>
    <rect x="230" y="40" width="70" height="190" fill="#fff"/>
    <rect x="300" y="40" width="70" height="190" fill="#fff"/>
    <rect x="370" y="40" width="70" height="190" fill="#fff"/>
    <rect x="440" y="40" width="70" height="190" fill="#fff"/>
  </g>

  <!-- Black keys: width 40, height 120. Positioned between whites -->
  <!-- C#: between C(20-90) and D(90-160) -> centered at 90 -> x=70 -->
  <!-- D#: centered at 160 -> x=140 -->
  <!-- (gap E-F: no black key) -->
  <!-- F#: centered at 300 -> x=280 -->
  <!-- G#: centered at 370 -> x=350 -->
  <!-- A#: centered at 440 -> x=420 -->
  <g fill="#222">
    <rect x="70"  y="40" width="40" height="120"/>
    <rect x="140" y="40" width="40" height="120"/>
    <rect x="280" y="40" width="40" height="120"/>
    <rect x="350" y="40" width="40" height="120"/>
    <rect x="420" y="40" width="40" height="120"/>
  </g>

  <!-- Black key labels -->
  <g font-size="10" fill="#fff" text-anchor="middle">
    <text x="90"  y="150">C♯/D♭</text>
    <text x="160" y="150">D♯/E♭</text>
    <text x="300" y="150">F♯/G♭</text>
    <text x="370" y="150">G♯/A♭</text>
    <text x="440" y="150">A♯/B♭</text>
  </g>

  <!-- White key labels: note name + solfege -->
  <g text-anchor="middle">
    <g font-size="20" font-weight="bold" fill="#c0392b">
      <text x="55"  y="205">C</text>
      <text x="125" y="205">D</text>
      <text x="195" y="205">E</text>
      <text x="265" y="205">F</text>
      <text x="335" y="205">G</text>
      <text x="405" y="205">A</text>
      <text x="475" y="205">B</text>
    </g>
    <g font-size="12" fill="#555">
      <text x="55"  y="222">do</text>
      <text x="125" y="222">re</text>
      <text x="195" y="222">mi</text>
      <text x="265" y="222">fa</text>
      <text x="335" y="222">sol</text>
      <text x="405" y="222">la</text>
      <text x="475" y="222">si</text>
    </g>
  </g>

  <!-- Group brackets for 2 and 3 black keys -->
  <g stroke="#2980b9" stroke-width="2" fill="none">
    <path d="M70 32 L180 32"/>
    <path d="M280 32 L460 32"/>
  </g>
  <g font-size="11" fill="#2980b9" text-anchor="middle">
    <text x="125" y="28">2 黑键一组</text>
    <text x="370" y="28">3 黑键一组</text>
  </g>
</svg>
