<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 240" font-family="Arial, sans-serif">
  <rect width="620" height="240" fill="#ffffff"/>
  <text x="310" y="24" font-size="16" font-weight="bold" text-anchor="middle" fill="#222">大调音阶公式：全-全-半-全-全-全-半</text>

  <!-- 8 white keys C-C -->
  <g stroke="#333" stroke-width="1.5" fill="#fff">
    <rect x="40"  y="60" width="60" height="130"/>
    <rect x="100" y="60" width="60" height="130"/>
    <rect x="160" y="60" width="60" height="130"/>
    <rect x="220" y="60" width="60" height="130"/>
    <rect x="280" y="60" width="60" height="130"/>
    <rect x="340" y="60" width="60" height="130"/>
    <rect x="400" y="60" width="60" height="130"/>
    <rect x="460" y="60" width="60" height="130"/>
  </g>
  <g fill="#222">
    <rect x="80"  y="60" width="40" height="82"/>
    <rect x="140" y="60" width="40" height="82"/>
    <rect x="250" y="60" width="40" height="82"/>
    <rect x="310" y="60" width="40" height="82"/>
    <rect x="370" y="60" width="40" height="82"/>
  </g>
  <g font-size="14" font-weight="bold" fill="#888" text-anchor="middle">
    <text x="70"  y="180">C</text>
    <text x="130" y="180">D</text>
    <text x="190" y="180">E</text>
    <text x="250" y="180">F</text>
    <text x="310" y="180">G</text>
    <text x="370" y="180">A</text>
    <text x="430" y="180">B</text>
    <text x="490" y="180">C</text>
  </g>

  <!-- step labels between keys at y=210 -->
  <g font-size="13" font-weight="bold" text-anchor="middle">
    <text x="100" y="214" fill="#2980b9">全</text>
    <text x="160" y="214" fill="#2980b9">全</text>
    <text x="220" y="214" fill="#c0392b">半</text>
    <text x="280" y="214" fill="#2980b9">全</text>
    <text x="340" y="214" fill="#2980b9">全</text>
    <text x="400" y="214" fill="#2980b9">全</text>
    <text x="460" y="214" fill="#c0392b">半</text>
  </g>
  <text x="310" y="234" font-size="11" text-anchor="middle" fill="#888">注意 E→F 与 B→C 是半音（之间无黑键），正好对应公式中的两个"半"</text>
</svg>
